<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>UK & Europe Fair</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            /* background: #cfd5db; */
            font-family: 'Poppins', sans-serif;
        }

        .banner {
            padding: 0 50px;
            /* 👈 left & right gaps */
        }

        .banner img {
            width: 96%;
            display: block;
            margin: 0 auto;
            /* 👈 centers automatically */
        }

        .form-wrapper {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        /* UPDATED INPUT DESIGN */
        .form-control,
        .form-select {
            background: #fff !important;
            border: 1px solid #ccc !important;
            height: 50px;
            border-radius: 8px;
            font-size: 14px;
            padding-right: 40px;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: none;
            border-color: #0d6efd !important;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #777;
            font-size: 13px;
        }

        .row-gap {
            margin-bottom: 18px;
        }

        .submit-btn {
            background: #0d6efd;
            color: #fff;
            padding: 10px 25px;
            border: none;
            border-radius: 6px;
            transition: 0.2s;
        }

        .submit-btn:hover {
            background: #0b5ed7;
        }

        /* EXTRA INPUT */
        .extra-input {
            display: none;
            margin-top: 8px;
        }

        select:invalid {
            color: rgb(94, 86, 86);
        }

        select option {
            color: #000;
        }

        .dropdown-menu {
            border-radius: 8px;
            border: 1px solid #ccc;
            max-height: 200px;
            overflow-y: auto;
        }

        .dropdown-item {
            padding: 8px;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background: #f1f1f1;
        }

        /* NEW STYLES FOR OTP VERIFICATION (PRESERVING ALL ORIGINAL) */
        .otp-container {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .otp-inputs {
            display: flex;
            gap: 10px;
        }

        .otp-digit {
            width: 55px;
            height: 55px;
            text-align: center;
            font-size: 24px;
            font-weight: 500;
            border: 1px solid #ccc;
            border-radius: 10px;
            background: #fff;
            transition: all 0.2s;
        }

        .otp-digit:focus {
            border-color: #0d6efd;
            outline: none;
            box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.2);
        }

        .verify-otp-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 8px;
            font-weight: 500;
            transition: 0.2s;
        }

        .verify-otp-btn:hover {
            background: #218838;
        }

        .verified-badge {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
            padding: 8px 16px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .input-group .btn-primary {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
            font-weight: 500;
        }

        .disabled-phone-input {
            background-color: #e9ecef !important;
            opacity: 0.9;
        }

        .small-error {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }

        .otp-helper {
            font-size: 12px;
            color: #6c757d;
            margin-top: 6px;
        }

        /* Validation error styling */
        .is-invalid-custom {
            border-color: #dc3545 !important;
            background-color: #fff8f8 !important;
        }

        .error-message {
            color: #dc3545;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        /* Ensure all columns have proper consistent width */
        .form-wrapper .row {
            margin-left: 0;
            margin-right: 0;
        }

        .form-wrapper [class*="col-"] {
            padding-left: 12px;
            padding-right: 12px;
        }

        /* Make input group consistent */
        .input-group {
            width: 100%;
        }

        /* Fix for verified status position */
        #verifiedStatus {
            margin-top: 8px;
        }

        /* Ensure program dropdown wrapper takes full height */
        .select-wrapper.position-relative {
            width: 100%;
        }

        /* Enhanced CAPTCHA styling */
        .captcha-container {
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
        }

        .captcha-checkbox {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding: 8px 12px;
            background: white;
            border: 1px solid #ced4da;
            border-radius: 6px;
            transition: 0.2s;
        }

        .captcha-checkbox:hover {
            background: #f8f9fa;
        }

        .captcha-checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .captcha-checkbox label {
            cursor: pointer;
            margin: 0;
            font-weight: 500;
            color: #333;
        }

        .captcha-status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .captcha-verified {
            background: #d4edda;
            color: #155724;
        }

        .captcha-unverified {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>

    <script>
        // ==================== ENHANCED VALIDATION WITH SPECIFIC ERROR MESSAGES ====================

        function getFieldLabel(field) {
            const placeholders = {
                'firstName': 'First Name', 'lastName': 'Last Name', 'email': 'E-Mail',
                'phone': 'Phone Number', 'country': 'Country', 'intake': 'Intake',
                'membership': 'i20fever Membership', 'nearestOffice': 'Nearest i20fever Office',
                'location': 'Location / Residence', 'bachelorsCollege': 'Bachelors College/School',
                'percentage': 'Percentage/CGPA', 'backlogs': 'Backlogs', 'passoutYear': 'Passout Year',
                'englishTest': 'TOEFL / IELTS / DET / PTE', 'greScore': 'SAT/GRE Score',
                'workExp': 'Work Experience', 'otherCountries': 'Interested in other Countries',
                'hearAbout': 'How did you hear about fair', 'visitOffice': 'Did you visit i20fever office?'
            };
            if (field.id && placeholders[field.id]) return placeholders[field.id];
            if (field.placeholder) return field.placeholder;
            return 'This field';
        }

        function showFieldError(field, message) {
            field.classList.add('is-invalid-custom');
            let errorDiv = field.parentElement.querySelector('.error-message');
            if (!errorDiv) {
                errorDiv = document.createElement('div');
                errorDiv.className = 'error-message';
                field.parentElement.appendChild(errorDiv);
            }
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
        }

        function clearFieldErrors() {
            document.querySelectorAll('.is-invalid-custom').forEach(field => {
                field.classList.remove('is-invalid-custom');
            });
            document.querySelectorAll('.error-message').forEach(msg => {
                msg.classList.remove('show');
            });
        }

        function scrollToFirstError() {
            const firstError = document.querySelector('.is-invalid-custom');
            if (firstError) {
                firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
                firstError.focus();
            }
        }

        function validateForm() {
            clearFieldErrors();
            let isValid = true;
            let errorMessages = [];

            // Get all required inputs and selects
            const requiredFields = document.querySelectorAll('#form input[required], #form select[required]');

            for (let field of requiredFields) {
                if (field.classList && field.classList.contains('otp-digit')) continue;
                if (field.type === 'hidden') continue;

                let value = field.value.trim();
                let fieldName = getFieldLabel(field);

                if (field.tagName === 'SELECT') {
                    const options = field.options;
                    const selectedIndex = field.selectedIndex;
                    if (selectedIndex === 0 || (options[selectedIndex] && options[selectedIndex].disabled) || value === "") {
                        showFieldError(field, `❌ Please select ${fieldName}`);
                        isValid = false;
                        errorMessages.push(`• ${fieldName}`);
                    }
                } else if (value === "") {
                    showFieldError(field, `❌ Please enter ${fieldName}`);
                    isValid = false;
                    errorMessages.push(`• ${fieldName}`);
                }
            }

            // Email format validation
            const emailField = document.getElementById("email");
            if (emailField && emailField.value.trim() !== "") {
                const email = emailField.value.trim();
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailPattern.test(email)) {
                    showFieldError(emailField, "❌ Please enter a valid email address (e.g., name@example.com)");
                    isValid = false;
                    errorMessages.push(`• Valid Email Address`);
                }
            } else if (emailField && emailField.value.trim() === "") {
                // Already handled by required check
            }

            // Phone validation
            const phoneField = document.getElementById("phone");
            const phoneVal = phoneField.value.trim();
            if (phoneVal === "") {
                showFieldError(phoneField, "❌ Please enter Phone Number");
                isValid = false;
            } else if (!/^[0-9]{10}$/.test(phoneVal)) {
                showFieldError(phoneField, "❌ Please enter a valid 10-digit phone number");
                isValid = false;
                errorMessages.push(`• Valid 10-digit Phone Number`);
            }

            // OTP verification check
            const phoneVerified = document.getElementById("phoneVerified").value;
            if (phoneVerified !== "true" && phoneVal !== "" && /^[0-9]{10}$/.test(phoneVal)) {
                alert("⚠️ Please verify your mobile number with OTP before submitting.");
                isValid = false;
            } else if (phoneVerified !== "true" && phoneVal === "") {
                // Already handled
            } else if (phoneVerified !== "true" && phoneVal !== "") {
                alert("⚠️ Please verify your mobile number with OTP before submitting.");
                isValid = false;
            }

            // CAPTCHA check with visual feedback
            const robotCheck = document.getElementById("robotCheck");
            const captchaFeedback = document.getElementById("captchaFeedback");
            if (!robotCheck.checked) {
                captchaFeedback.innerHTML = '<div class="captcha-status-badge captcha-unverified"><i class="fa-solid fa-exclamation-triangle"></i> Please confirm you\'re not a robot</div>';
                isValid = false;
            } else {
                captchaFeedback.innerHTML = '<div class="captcha-status-badge captcha-verified"><i class="fa-solid fa-circle-check"></i> Verified - You\'re not a robot ✓</div>';
            }

            // Show alert with missing fields if any
            if (!isValid && errorMessages.length > 0) {
                alert(`❌ Please complete the following required fields:\n\n${errorMessages.join('\n')}`);
            } else if (!isValid) {
                alert("❌ Please fill in all required fields correctly.");
            }

            return isValid;
        }

        // CAPTCHA visual feedback on checkbox change
        document.getElementById("robotCheck").addEventListener("change", function () {
            const captchaFeedback = document.getElementById("captchaFeedback");
            if (this.checked) {
                captchaFeedback.innerHTML = '<div class="captcha-status-badge captcha-verified"><i class="fa-solid fa-circle-check"></i> Verified - You\'re not a robot ✓</div>';
            } else {
                captchaFeedback.innerHTML = '';
            }
        });

        // ==================== OTP LOGIC (PRESERVED) ====================
        let otp = "";

        const phoneInput = document.getElementById("phone");
        const sendOtpBtn = document.getElementById("otpBtn");
        const otpSection = document.getElementById("otpSection");
        const verifiedStatusDiv = document.getElementById("verifiedStatus");
        const phoneVerifiedHidden = document.getElementById("phoneVerified");
        const otpDigits = [document.getElementById("otp1"), document.getElementById("otp2"), document.getElementById("otp3"), document.getElementById("otp4")];
        const verifyBtn = document.getElementById("verifyOtpBtn");

        function setupOtpAutoTab() {
            otpDigits.forEach((digit, idx) => {
                if (!digit) return;
                digit.addEventListener("input", (e) => {
                    if (digit.value.length === 1 && idx < 3) {
                        otpDigits[idx + 1].focus();
                    }
                });
                digit.addEventListener("keydown", (e) => {
                    if (e.key === "Backspace" && idx > 0 && digit.value === "") {
                        otpDigits[idx - 1].focus();
                    }
                });
            });
        }

        function clearOtpFields() {
            otpDigits.forEach(d => { if (d) d.value = ""; });
        }

        function getEnteredOtp() {
            let code = "";
            for (let d of otpDigits) {
                if (!d) return "";
                if (d.value.match(/[0-9]/)) code += d.value;
                else return "";
            }
            return code;
        }

        sendOtpBtn.onclick = function () {
            let phone = document.getElementById("phone").value;
            if (!/^[0-9]{10}$/.test(phone)) {
                alert("❌ Enter valid 10-digit phone number");
                return;
            }
            if (phoneVerifiedHidden.value === "true") {
                phoneVerifiedHidden.value = "false";
                verifiedStatusDiv.style.display = "none";
                otpSection.style.display = "block";
                sendOtpBtn.textContent = "Send OTP";
                sendOtpBtn.classList.remove("btn-success");
                sendOtpBtn.classList.add("btn-primary");
                clearOtpFields();
            }
            otp = Math.floor(1000 + Math.random() * 9000).toString();
            alert(`📱 OTP sent to ${phone}\n🔐 Your verification OTP is: ${otp}\n(For demo, enter this code to verify)`);
            otpSection.style.display = "block";
            verifyBtn.disabled = false;
            verifyBtn.textContent = "Verify";
            clearOtpFields();
            setTimeout(() => { if (otpDigits[0]) otpDigits[0].focus(); }, 100);
        };

        verifyBtn.onclick = function () {
            const phoneNum = phoneInput.value;
            if (!/^[0-9]{10}$/.test(phoneNum)) {
                alert("❌ Please enter a valid 10-digit phone number before verifying OTP.");
                return;
            }
            if (!otp) {
                alert("❌ Please request OTP first by clicking 'Send OTP'.");
                return;
            }
            const enteredCode = getEnteredOtp();
            if (enteredCode.length !== 4) {
                alert("❌ Please enter the complete 4-digit OTP.");
                return;
            }
            if (enteredCode === otp) {
                phoneVerifiedHidden.value = "true";
                otpSection.style.display = "none";
                verifiedStatusDiv.style.display = "block";
                sendOtpBtn.textContent = "Verified ✓";
                sendOtpBtn.classList.remove("btn-primary");
                sendOtpBtn.classList.add("btn-success");
                alert("✅ Phone number verified successfully!");
            } else {
                alert("❌ Invalid OTP. Please try again or request new OTP.");
                clearOtpFields();
                if (otpDigits[0]) otpDigits[0].focus();
            }
        };

        phoneInput.addEventListener("input", function () {
            if (phoneVerifiedHidden.value === "true") {
                phoneVerifiedHidden.value = "false";
                verifiedStatusDiv.style.display = "none";
                sendOtpBtn.textContent = "Send OTP";
                sendOtpBtn.classList.remove("btn-success");
                sendOtpBtn.classList.add("btn-primary");
                otpSection.style.display = "none";
                clearOtpFields();
                otp = "";
            }
        });

        setupOtpAutoTab();

        // Country other logic
        document.getElementById("country").onchange = function () {
            document.getElementById("countryOther").style.display = this.value === "other" ? "block" : "none";
        };

        // Custom major dropdown logic
        const majorOptions = document.querySelectorAll("#dropdownMenu .dropdown-item");
        const courseOtherInput = document.getElementById("courseOther");
        const selectedSpan = document.getElementById("selectedText");
        majorOptions.forEach(opt => {
            opt.addEventListener("click", function () {
                if (opt.innerText === "Other") {
                    if (courseOtherInput) courseOtherInput.style.display = "block";
                } else {
                    if (courseOtherInput) courseOtherInput.style.display = "none";
                }
            });
        });
        const customCourse = document.getElementById("courseInput");
        if (customCourse && courseOtherInput) {
            customCourse.addEventListener("input", function () {
                if (customCourse.value.trim() !== "") {
                    courseOtherInput.style.display = "none";
                } else if (selectedSpan.innerText === "Other") {
                    courseOtherInput.style.display = "block";
                }
            });
        }

        // Submit handler
        document.getElementById("form").onsubmit = function (e) {
            e.preventDefault();
            if (validateForm()) {
                alert("✅ Form submitted successfully!");
                // this.submit();
            }
        };

    </script>

    <script>
        // ORIGINAL DROPDOWN SCRIPT FOR MAJOR (PRESERVED)
        const box = document.getElementById("dropdownBox");
        const menu = document.getElementById("dropdownMenu");
        const input = document.getElementById("courseInput");
        const text = document.getElementById("selectedText");

        if (box) {
            box.onclick = (e) => {
                e.stopPropagation();
                menu.style.display = (menu.style.display === "block") ? "none" : "block";
                if (menu.style.display === "block") {
                    setTimeout(() => input.focus(), 100);
                }
            };
        }

        if (menu) {
            menu.addEventListener("click", function (e) {
                e.stopPropagation();
            });
        }

        if (document.querySelectorAll("#dropdownMenu .dropdown-item")) {
            document.querySelectorAll("#dropdownMenu .dropdown-item").forEach(item => {
                item.onclick = () => {
                    text.innerText = item.innerText;
                    text.style.color = "#000";
                    menu.style.display = "none";
                    const courseOtherField = document.getElementById("courseOther");
                    if (item.innerText === "Other") {
                        if (courseOtherField) courseOtherField.style.display = "block";
                    } else {
                        if (courseOtherField) courseOtherField.style.display = "none";
                    }
                };
            });
        }

        if (input) {
            input.addEventListener("input", () => {
                text.innerText = input.value || "Major Interested to Apply";
                text.style.color = input.value ? "#000" : "#888";
                if (input.value.trim() !== "") {
                    const courseOtherField = document.getElementById("courseOther");
                    if (courseOtherField) courseOtherField.style.display = "none";
                } else if (text.innerText === "Other") {
                    const courseOtherField = document.getElementById("courseOther");
                    if (courseOtherField) courseOtherField.style.display = "block";
                }
            });
        }

        document.addEventListener("click", function () {
            if (menu) menu.style.display = "none";
        });
    </script>

    <script>
        // ORIGINAL PROGRAM DROPDOWN (PRESERVED)
        const pBox = document.getElementById("programBox");
        const pMenu = document.getElementById("programMenu");
        const pInput = document.getElementById("programInput");
        const pText = document.getElementById("programText");

        if (pBox) {
            pBox.onclick = (e) => {
                e.stopPropagation();
                pMenu.style.display = (pMenu.style.display === "block") ? "none" : "block";
                if (pMenu.style.display === "block") {
                    setTimeout(() => pInput.focus(), 100);
                }
            };
        }

        if (pMenu) {
            pMenu.addEventListener("click", (e) => e.stopPropagation());
            pMenu.querySelectorAll(".dropdown-item").forEach(item => {
                item.onclick = () => {
                    pText.innerText = item.innerText;
                    pText.style.color = "#000";
                    pMenu.style.display = "none";
                };
            });
        }

        if (pInput) {
            pInput.addEventListener("input", () => {
                pText.innerText = pInput.value || "Select Your Major/Programme";
                pText.style.color = pInput.value ? "#000" : "#888";
            });
        }

        document.addEventListener("click", () => {
            if (pMenu) pMenu.style.display = "none";
        });
    </script>
